<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Domain Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .domain-selector {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .domain-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        .domain-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .domain-btn {
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }
        
        .domain-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .domain-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }
        
        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            word-wrap: break-word;
        }
        
        .user .message-content {
            background: #667eea;
            color: white;
        }
        
        .ai .message-content {
            background: #e0e0e0;
            color: #333;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-area button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        
        .input-area button:hover {
            background: #5568d3;
        }
        
        .input-area button:active {
            transform: scale(0.98);
        }
        
        .loading {
            text-align: center;
            color: #999;
            padding: 10px;
            font-style: italic;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        @media (max-width: 600px) {
            .domain-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .message-content {
                max-width: 90%;
            }
            
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Multi-Domain Chatbot</h1>
            <p>Select a domain and start chatting with AI</p>
        </div>
        
        <div class="domain-selector">
            <label>Choose Domain:</label>
            <div class="domain-buttons" id="domainButtons"></div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="message-content">
                    👋 नमस्ते! Welcome to your Multi-Domain AI Chatbot! 
                    <br><br>
                    Please select a domain from above and ask your question. 
                    I'm here to help with Education, Health, Career, Food, Real Estate, and Tech Support!
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message and press Enter...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    
    <script>
        let selectedDomain = 'education';
        
        // Load domains
        async function loadDomains() {
            try {
                const response = await fetch('/api/domains');
                const domains = await response.json();
                const domainButtons = document.getElementById('domainButtons');
                
                for (const [key, value] of Object.entries(domains)) {
                    const btn = document.createElement('button');
                    btn.className = 'domain-btn' + (key === selectedDomain ? ' active' : '');
                    btn.textContent = value;
                    btn.onclick = () => selectDomain(key, btn);
                    domainButtons.appendChild(btn);
                }
            } catch (error) {
                console.error('Error loading domains:', error);
            }
        }
        
        function selectDomain(domain, button) {
            selectedDomain = domain;
            document.querySelectorAll('.domain-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            // Clear chat
            document.getElementById('chatArea').innerHTML = `
                <div class="message ai">
                    <div class="message-content">
                        ✨ Domain changed to: <strong>${button.textContent}</strong>
                        <br><br>
                        You can now ask questions related to this domain!
                    </div>
                </div>
            `;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            
            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai loading';
            loadingDiv.textContent = 'Thinking...';
            document.getElementById('chatArea').appendChild(loadingDiv);
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        domain: selectedDomain
                    })
                });
                
                const data = await response.json();
                
                // Remove loading
                loadingDiv.remove();
                
                if (data.error) {
                    addMessage('Error: ' + data.error, 'ai');
                } else {
                    addMessage(data.ai_response, 'ai');
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('Connection error. Please try again.', 'ai');
                console.error('Error:', error);
            }
        }
        
        function addMessage(message, sender) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(message)}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
                '\n': '<br>'
            };
            return text.replace(/[&<>"'\n]/g, m => map[m]);
        }
        
        // Allow Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Load domains on page load
        loadDomains();
    </script>
</body>
</html>
